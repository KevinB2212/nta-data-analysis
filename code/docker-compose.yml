services:
  postgres:
    image: postgres:16
    container_name: nta_data_analysis
    environment:
      POSTGRES_DB: nta_data_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - nta_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nta_data_analysis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nta_pg_data: